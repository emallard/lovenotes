<!doctype html>
<head>
<meta name="viewport" content="width = 1050, user-scalable = no" />
<script type="text/javascript" src="js/jquery.min.1.7.js"></script>
<script type="text/javascript" src="js/turn.js"></script>
</head>
<body>

<div class="flipbook-viewport">
	<div class="container">
		<div class="flipbook">
			<div style="background-image:url(1.jpg)"></div>
			<div style="background-image:url(2.jpg)"></div>
			<div style="background-image:url(3.jpg)"></div>
			<div style="background-image:url(4.jpg)"></div>
			<div style="background-image:url(5.jpg)"></div>
		</div>
	</div>
</div>


<script type="text/javascript">

function loadApp() {

	// Create the flipbook

	$('.flipbook').turn({
			// Width

			width:922/2,
			
			// Height

			height:600,

			// Elevation

			elevation: 50,
			
			// Enable gradients

			gradients: true,
			
			// Auto center this flipbook

			autoCenter: true,

			display: "single"

	});
}

loadApp();

</script>

</body>
</html>
