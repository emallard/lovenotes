<!doctype html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script type="text/javascript" src="js/jquery.min.1.7.js"></script>
<script type="text/javascript" src="js/turn.js"></script>
</head>
<body>

<div class="flipbook-viewport">
	<div class="container">
		<div class="flipbook">
            <!--
			<div style="background-image:url(2.jpg)"></div>
			<div style="background-image:url(3.jpg)"></div>
			<div style="background-image:url(4.jpg)"></div>
			<div style="background-image:url(5.jpg)"></div>
            -->
		</div>
	</div>
</div>

<style>

    body{ margin:0;
    background-color: #f9f9f9; }
    /*
    * { box-sizing: border-box; }
    */

    .page {
        background-color: white;
        backface-visibility: hidden;
    }

    .flipbook-viewport {
        position:absolute;
        top: calc((100% - 500px) / 2);
        left: 0;
        right:0;
        height:500px;
        background-image:url(book-open-2.png);
        background-repeat: no-repeat;

        .container {
            /*margin-left: 50px;*/
            margin-top:36px;
        }
    }

    .page-shift-right {
        padding-left: 80px;
        background-image: url(book-open-page.png);
    }


    .innerpage {
        padding-right:80px;
    }
    .my-cover {
        .title {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            background: #e7d3b3;
            padding:10px;
            border: solid 1px black;
        }

    }

    .my-note {
        /*background: white;
        */
        /*
        background: linear-gradient(to bottom,white 29px,#00b0d7 1px);
        background-size: 100% 30px;
        */
        h1 {
            text-align:center;
            display:block;
        }

        .date
        {
            display:block;
            border-width:0;
            height:30px;
        }

        input, textarea {
            background-color: transparent;

            border-width:0;
            /*
            position:absolute;
            top: 30px; left:0; right:0; bottom:0;
            display:block;
            background: linear-gradient(to bottom,white 29px,#00b0d7 1px);
            background-size: 100% 30px;
            */
        }
    }
</style>

<script type="text/javascript">

function loadApp() {

	// Create the flipbook

	$('.flipbook').turn({
			// Width

			//width:window.innerWidth,
			width: 331,
			// Height

			//height:window.innerHeight,
            height: 421,
			// Elevation

			elevation: 50,
			
			// Enable gradients

			gradients: true,
			
			// Auto center this flipbook

			autoCenter: true,

			display: "single"

	});
}


function populateCover()
{
    document.querySelector('.flipbook').innerHTML += `
        <div class="my-cover" style="background-image:url(redcover.jpg)">
            <div class="title">
                Carnet de voyage<br>
                Avril 2026<br>
                <br>
                - France<br>
                - Suisse<br>
                - Italie<br>
            </div>
        </div>
    `
}

function populateForewords()
{
    document.querySelector('.flipbook').innerHTML += `
    <div class="page-shift-right">
        <div class="innerpage">
            <h1>Forewords</h1>
            We hope this book will record your best notes for this trip !
            <br><br>
            Ceri & Etienne
        </div>
    </div>
    `
}

function populateNewPage() 
{

}


function populate()
{
    for (let i=0; i<10; ++i)
    {
        document.querySelector('.flipbook').innerHTML += `
        <div class="page-shift-right">
            <div class="innerpage">
                <div class="my-note">
                    <h1 contenteditable="true">Titre${i}</h1>
                    <input type="date" class="date">
                    <textarea>Blah</textarea>
                </div>
            </div>
        </div>`;
    }
/*
    document.getElementById("editor").addEventListener("input", function() {
        console.log("input event fired");
    }, false);
*/
}

//populateCover();
populateForewords();

populate();
loadApp();

{

}

{

}


</script>

</body>
</html>
